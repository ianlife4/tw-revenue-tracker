name: Revenue Monitor

on:
  push:
    branches: [main]
    paths: ['.github/workflows/monitor.yml']
  schedule:
    # 每月 1~12 日，每 10 分鐘偵測 (UTC+8 → UTC 需減 8)
    # 台灣時間 08:00~24:00 → UTC 00:00~16:00
    - cron: '*/10 0-16 1-12 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "monitor"
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-check (doctor)
        run: python doctor.py --ci

      - name: Run monitor
        id: monitor
        run: python monitor.py

      - name: Diagnose failure (doctor)
        if: failure() && steps.monitor.outcome == 'failure'
        run: python doctor.py --ci-diagnose

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/ data/monitor_state.json data/t1_cache.json data/all_revenue_mops.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "auto: update revenue filings $(date -u +%Y-%m-%d\ %H:%M)"
            if ! git pull --rebase; then
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase --no-edit || true
            fi
            git push || echo "Push failed, will retry next run"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # 直接部署 GitHub Pages（不依賴另一個 workflow）
      - name: Setup Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output'

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
