name: Revenue Monitor

on:
  schedule:
    # 每月 1~12 日，每 5 分鐘偵測 (UTC+8 → UTC 需減 8)
    # 台灣時間 17:00~23:59 → UTC 09:00~15:59
    - cron: '*/5 9-15 1-12 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "monitor"
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        run: python monitor.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ data/monitor_state.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update revenue filings $(date -u +%Y-%m-%d\ %H:%M)"
            git push
          fi
